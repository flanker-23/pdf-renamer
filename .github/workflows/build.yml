name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # allows manual trigger from GitHub UI

jobs:
  build:
    runs-on: windows-latest   # real Windows machine in GitHub's cloud

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pdfplumber PyPDF2 "pyinstaller>=6.0.0"

      - name: Build EXE
        run: pyinstaller pdf_renamer.spec --clean --noconfirm

      - name: Upload EXE as artifact
        uses: actions/upload-artifact@v4
        with:
          name: PDF-Renamer-Windows
          path: "dist/PDF Renamer.exe"
          retention-days: 30
